<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Liquidity Pools</title>
  <link rel="stylesheet" href="styles.css">

</head>
<body>

<div class="container">
  <!-- Cabecera -->
  <div class="header">
    <h1>📊 Liquidity Pools</h1>
    <div class="header-actions">
      <button class="btn btn-secondary" id="btnSync" type="button">↻ Sync ETH</button>
      <button class="btn" id="btnNuevaPosicion" type="button">➕ Nueva Posición</button>
    </div>
  </div>

  <p class="sync-status" id="syncStatus">Sincronizá para consultar el precio de ETH en Binance.</p>

  <!-- Listado -->
  <div id="listadoPosiciones"></div>
</div>

<!-- Modal genérico -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContenido">
    <!-- El contenido se inyecta dinámicamente -->
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
